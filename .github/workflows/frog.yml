name: Daily Frog
 
on:
  schedule:
    - cron: '0 9 * * *'  # Every day at 9:00 AM UTC
  workflow_dispatch:       # Lets you trigger it manually from GitHub
 
jobs:
  check:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Restore last post state
        uses: actions/cache@v4
        with:
          path: last_post.json
          key: last-post-cache
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install instaloader requests
 
      - name: Run frog checker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          INSTAGRAM_USER: ${{ secrets.INSTAGRAM_USER }}
          INSTAGRAM_PASS: ${{ secrets.INSTAGRAM_PASS }}
        run: python check_frog.py
 
      - name: Save last post state
        uses: actions/cache@v4
        with:
          path: last_post.json
          key: last-post-cache
