name: Daily Frog
 
on:
  schedule:
    - cron: '0 9 * * *'  # Every day at 9:00 AM UTC (10:00 AM Copenhagen)
  workflow_dispatch:       # Lets you trigger it manually from GitHub
 
jobs:
  check:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install requests
 
      - name: Run frog checker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python check_frog.py
 
      - name: Save last post state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_post.json
          git diff --staged --quiet || git commit -m "Update last post state"
          git push
